<svg xmlns="http://www.w3.org/2000/svg" width="760" height="120" viewBox="0 0 760 120" fill="none" xml:space="preserve" role="img" aria-label="Chainvet — Founder and Maintainer. Hybrid Solidity smart-contract security analyzer, written in Rust.">
  <style>
    .bg   { fill:#181825; stroke:#313244; stroke-width:1; }
    .pill { fill:#232334; stroke:#45415a; stroke-width:1; }
    .mono { font-family: ui-monospace,"SF Mono","IBM Plex Mono",Menlo,monospace; }
    .title{ fill:#cba6f7; font-size:28px; font-weight:700; }
    .role { fill:#94e2d5; font-size:13px; }
    .desc { fill:#cdd6f4; font-size:14px; }
    .dim  { fill:#a6adc8; font-size:13px; }
    .mau  { fill:#cba6f7; font-size:13px; }
    .yel  { fill:#f9e2af; font-size:13px; }
    .hint { fill:#6c7086; font-size:12px; }
  </style>

  <rect class="bg" x="0.5" y="0.5" width="759" height="119" rx="14"/>

  <!-- left accent bar -->
  <rect x="0" y="14" width="4" height="92" rx="2" fill="#cba6f7"/>

  <!-- title + role -->
  <text class="mono title" x="32" y="52">Chainvet</text>
  <rect class="pill" x="185" y="33" width="182" height="26" rx="8"/>
  <text class="mono role" x="197" y="50">Founder &amp; Maintainer</text>

  <!-- description -->
  <text class="mono desc" x="33" y="82">Hybrid Solidity smart-contract security analyzer</text>

  <!-- meta row -->
  <circle cx="36" cy="101" r="3.5" fill="#cba6f7"/>
  <text class="mono dim" x="47" y="105">Rust</text>
  <text class="mono yel" x="104" y="105">★ 3</text>
  <text class="mono mau" x="150" y="105">chainvet.dev</text>

  <!-- clickable hint -->
  <text class="mono hint" x="728" y="30" text-anchor="end">github.com/chainvet ↗</text>
</svg>
