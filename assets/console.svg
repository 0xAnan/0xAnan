<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" fill="none" xml:space="preserve" role="img" aria-label="Animated attack console: recon, exploit, root shell">
  <style>
    .bg   { fill:#181825; stroke:#313244; stroke-width:1; }
    .bar  { fill:#232334; }
    .t    { font-family: ui-monospace,"SF Mono","IBM Plex Mono",Menlo,monospace; font-size:15px; }
    .ttl  { font-family: ui-monospace,"SF Mono",Menlo,monospace; font-size:12px; fill:#a6adc8; }
    .txt  { fill:#cdd6f4; }
    .dim  { fill:#a6adc8; }
    .mau  { fill:#cba6f7; }
    .tea  { fill:#94e2d5; }
    .grn  { fill:#a6e3a1; }
    .yel  { fill:#f9e2af; }

    .ln { opacity:0; }
    .l1 { animation: r1 9s ease-out infinite; }
    .l2 { animation: r2 9s ease-out infinite; }
    .l3 { animation: r3 9s ease-out infinite; }
    .l4 { animation: r4 9s ease-out infinite; }
    .l5 { animation: r5 9s ease-out infinite; }
    .l6 { animation: r6 9s ease-out infinite; }
    .cur{ animation: blink 1.05s steps(1) infinite; }
    .live{ animation: pulse 1.6s ease-in-out infinite; }

    @keyframes r1 {0%,2%{opacity:0} 5%,93%{opacity:1} 100%{opacity:0}}
    @keyframes r2 {0%,13%{opacity:0} 16%,93%{opacity:1} 100%{opacity:0}}
    @keyframes r3 {0%,24%{opacity:0} 27%,93%{opacity:1} 100%{opacity:0}}
    @keyframes r4 {0%,39%{opacity:0} 42%,93%{opacity:1} 100%{opacity:0}}
    @keyframes r5 {0%,52%{opacity:0} 55%,93%{opacity:1} 100%{opacity:0}}
    @keyframes r6 {0%,64%{opacity:0} 67%,93%{opacity:1} 100%{opacity:0}}
    @keyframes blink {0%,50%{opacity:1} 51%,100%{opacity:0}}
    @keyframes pulse {0%,100%{opacity:1} 50%{opacity:0.25}}
  </style>

  <rect class="bg"  x="0.5" y="0.5" width="759" height="249" rx="14"/>
  <path class="bar" d="M0 14 a14 14 0 0 1 14 -14 h732 a14 14 0 0 1 14 14 v22 h-760 z"/>
  <circle cx="24" cy="18" r="5" fill="#f38ba8"/>
  <circle cx="44" cy="18" r="5" fill="#f9e2af"/>
  <circle cx="64" cy="18" r="5" fill="#a6e3a1"/>
  <text class="ttl" x="92" y="22">anan@tensai: ~/exploit</text>
  <circle class="live" cx="690" cy="18" r="4" fill="#a6e3a1"/>
  <text class="ttl" x="702" y="22" fill="#a6e3a1">live</text>

  <text class="t l1 ln" x="24" y="72"><tspan class="mau">anan@tensai:~$</tspan><tspan class="txt"> ./recon --target acme.corp</tspan></text>
  <text class="t l2 ln" x="24" y="100"><tspan class="tea">[*]</tspan><tspan class="dim"> mapping attack surface ... 254 hosts</tspan></text>
  <text class="t l3 ln" x="24" y="128"><tspan class="grn">[+]</tspan><tspan class="txt"> 3 up · 12 ports · 1 juicy endpoint</tspan></text>
  <text class="t l4 ln" x="24" y="164"><tspan class="mau">anan@tensai:~$</tspan><tspan class="txt"> ./exploit --chain auth-bypass,rce</tspan></text>
  <text class="t l5 ln" x="24" y="192"><tspan class="yel">[~]</tspan><tspan class="dim"> payload landed · escalating ...</tspan></text>
  <g class="l6 ln">
    <text class="t" x="24" y="220"><tspan class="grn">[+]</tspan><tspan class="txt"> shell acquired · </tspan><tspan class="mau">uid=0(root)</tspan></text>
    <rect class="cur" x="337" y="209" width="9" height="14" fill="#cba6f7"/>
  </g>
</svg>
