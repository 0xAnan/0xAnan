# .github/workflows/snake.yml
name: generate snake
on:
  schedule:
    - cron: "0 */12 * * *"   # every 12h
  workflow_dispatch:          # manual run button
  push:
    branches: [main]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: 0xAnan
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=cba6f7&color_dots=1e1e2e,45415a,7c5cad,a986e0,cba6f7

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
